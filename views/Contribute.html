<!DOCTYPE html>
<script src="document_upload.js"></script>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share2Teach</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="landing.html" class="logo"><img src="logo.jpg" alt="NWU LOGO" width="25%" align="left"></a></li>
                <li class="dropdown">
                    <a href="#" class="dropdown-toggle">Explore</a>
                    <ul class="dropdown-menu">
                        <li><a href="landing.html">Home</a></li>
                        <li><a href="FAQ.html">FAQ</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="regbox">
            <h1>Contribute new Documents</h1>
            <div class="subbox">
                <form>
                    <!-- File input field -->
                    <input type="file" id="document-upload" accept=".pdf, .docx, .doc">

                    <!-- Display document name -->
                    <p id="document-name"></p>

                    <!-- Progress bar (optional) -->
                    <progress id="progress-bar" value="0" max="100" align="centre"></progress>
                    
                    <div class="buttons">
                    <!-- Button to save file -->
                    <button id="save-btn">Save</button>
                    <button id="Cancel" >Cancel</button>
                        
                    </div>

                </form>
            </div>
        </div>

    </main>
    <footer>
        <p>&copy; 2024 Share 2 Teach</p>
    </footer>
</body>
</html>
