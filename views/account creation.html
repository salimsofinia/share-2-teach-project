<!DOCTYPE html>
<script src="document_upload.js"></script>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share2Teach</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li>
            <a href="landing.html" class="logo"
              ><img src="logo.jpg" alt="NWU LOGO" width="25%" align="left"
            /></a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="regbox">
        <h1>Register new Account</h1>
        <div class="box">
          <form>
            <label for="name">First name:</label>
            <input type="text" id="name" name="name" /><br /><br />
            <label for="last-name">Last Name:</label>
            <input type="text" id="last-name" name="last-name" /><br /><br />
            <label for="email">E-Mail:</label>
            <input type="text" id="email" name="email" /><br /><br />
            <label for="Affiliation">Affiliation:</label>
            <input
              type="text"
              id="Affiliation"
              name="Affiliation"
            /><br /><br />
            <label for="Credentials">Credentials:</label>
            <input
              type="text"
              id="Credentials"
              name="Credentials"
            /><br /><br />
            <label for="password">Password:</label>
            <input type="text" id="password" name="password" /><br /><br />
            <input
              type="radio"
              id="admin-radio"
              name="userRole"
              value="Admin"
            />
            <label for="admin-radio">Admin</label><br /><br />

            <input
              type="radio"
              id="moderator-radio"
              name="userRole"
              value="Moderator"
            />
            <label for="moderator-radio">Moderator</label><br /><br />

            <input
              type="radio"
              id="educator-radio"
              name="userRole"
              value="Educator"
            />
            <label for="educator-radio">Educator</label><br /><br />
            <div class="buttons">
              <button type="button" id="create-button">Create Account</button>
              <button type="button" onclick="location.href='landing.html'">
                Cancel
              </button>
            </div>
            <script>
              // Wait for the DOM to load
              document.addEventListener("DOMContentLoaded", () => {
                // Function to create user
                async function createUser() {
                  const selectedRadio = document.querySelector(
                    'input[name="userRole"]:checked'
                  );

                  if (!selectedRadio) {
                    alert("You must choose a role"); // Logs the value of the selected radio button
                    return;
                  }
                  // Get form data
                  const firstname = document.getElementById("name").value;
                  const lastname = document.getElementById("last-name").value;
                  const email = document.getElementById("email").value;
                  const affiliation =
                    document.getElementById("Affiliation").value;
                  const credentials =
                    document.getElementById("Credentials").value;
                  const password = document.getElementById("password").value;
                  const role = selectedRadio.value;

                  // Create user object
                  const user = {
                    firstname,
                    lastname,
                    email,
                    affiliation,
                    credentials,
                    password,
                    role,
                  };

                  // Send POST request to API endpoint
                  try {
                    const response = await fetch("/api/user", {
                      method: "POST",
                      headers: {
                        "Content-Type": "application/json",
                      },
                      body: JSON.stringify(user),
                    });

                    const data = await response.json();

                    if (response.ok) {
                      alert("User created successfully.");
                      location.href = "landing.html";
                    } else {
                      alert(data.message);
                    }
                  } catch (error) {
                    console.error(error);
                  }
                }

                // Add event listener to create account button
                document
                  .getElementById("create-button")
                  .addEventListener("click", createUser);
              });
            </script>
          </form>
        </div>
      </div>
    </main>
    <footer>
      <p>&copy; 2024 Share 2 Teach</p>
    </footer>
  </body>
</html>
