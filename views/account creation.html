<!DOCTYPE html>
<script src="document_upload.js"></script>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share2Teach</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="landing.html" class="logo"><img src="logo.jpg" alt="NWU LOGO" width="25%" align="left"></a></li>
            </ul>
        </nav>
    </header>
    <main>
        
        <div class="regbox">
            <h1>Register new Account</h1>
            <div class="box">
                <form>
                    <label for="name">First name:</label>
                    <input type="text" id="name" name="name"><br><br>
                    <label for="last-name">Last Name:</label>
                    <input type="text" id="last-name" name="last-name"><br><br>
                    <label for="email">E-Mail:</label>
                    <input type="text" id="email" name="email"><br><br>
                    <label for="Affiliation">Affiliation:</label>
                    <input type="text" id="Affiliation" name="Affiliation"><br><br>
                    <label for="Credentials">Credentials:</label>
                    <input type="text" id="Credentials" name="Credentials"><br><br>
                    <label for="password">Password:</label>
                    <input type="text" id="password" name="password"><br><br>
                    <input class="hide-when-not-admin" type="checkbox" id="checkbox-id" name="checkbox-name" value="checkbox-value">
                    <label class="hide-when-not-admin" for="checkbox-id">Is-Admin</label><br><br>
                    <div class="buttons">
                <button type="button">Create Account</button>
                <button type="button" onclick="location.href='landing.html'">Cancel</button>
            </div>
                </form>
            </div>
        </div>
        
    </main>
    <footer>
        <p>&copy; 2024 Share 2 Teach</p>
    </footer>
</body>
</html>
