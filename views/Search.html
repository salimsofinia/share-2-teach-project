<!DOCTYPE html>
<script src="document_upload.js"></script>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share2Teach</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Add styles for the datagrid */
      .datagrid {
        border-collapse: collapse;
        width: 100%;
      }

      .datagrid th,
      .datagrid td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: left;
      }

      .datagrid th {
        background-color: #3c1361;
      }
    </style>
  </head>
  <body onload="popFileTable(); initrest()">
    <header>
      <nav>
        <ul>
          <li>
            <a href="landing.html" class="logo"
              ><img src="logo.jpg" alt="NWU LOGO" width="25%" align="left"
            /></a>
          </li>
          <li class="dropdown">
            <a href="#" class="dropdown-toggle">Explore</a>
            <ul class="dropdown-menu">
              <li><a href="landing.html">Home</a></li>
              <li class="hide-when-logged-out">
                <a href="Contribute.html">Contribute </a>
              </li>
              <li><a href="FAQ.html">FAQ</a></li>
            </ul>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="popup" id="popup">
        <div class="popup-content">
          <form>
            <p>Select reasons for reporting this file:</p>
            <br />
            <input
              type="checkbox"
              id="inaccurate"
              name="reportReason"
              value="inaccurate"
            />
            <label for="inaccurate">Inaccurate</label><br />

            <input
              type="checkbox"
              id="irrelevant"
              name="reportReason"
              value="irrelevant"
            />
            <label for="irrelevant">Irrelevant content</label><br />

            <input
              type="checkbox"
              id="offensive"
              name="reportReason"
              value="offensive"
            />
            <label for="offensive">Offensive material</label><br />

            <input
              type="checkbox"
              id="outdated"
              name="reportReason"
              value="outdated"
            />
            <label for="outdated">Outdated information</label><br />

            <input
              type="checkbox"
              id="other"
              name="reportReason"
              value="other"
            />
            <label for="other">Other</label><br /><br />

            <button type="button" onclick="submitReport()">Report</button>
            <button onclick="closePopup()">Cancel</button>
          </form>
        </div>
      </div>

      <div class="regbox">
        <h1>Search for documents</h1>
        <div class="subbox">
          <form>
            <div class="buttons">
              <button type="button" onclick="searchDocuments()">Search</button>
              <button type="button" onclick="location.href='landing.html'">
                Cancel
              </button>
            </div>
            <h2>Available Documents:</h2>
            <br />
            <table class="datagrid" id="fileTable">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Size</th>
                  <th>Subject</th>
                  <th>Grade</th>
                  <th>File Rating</th>
                  <th>Your Rating</th>
                  <th>Download</th>
                  <th>Report</th>
                </tr>
              </thead>
              <tbody>
                <!-- Sample data -->
              </tbody>
            </table>
          </form>
        </div>
      </div>
    </main>
    <footer>
      <p>&copy; 2024 Share 2 Teach</p>
    </footer>
  </body>
</html>
